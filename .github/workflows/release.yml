name: Build desktop apps

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      should_release: ${{ steps.gate.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from pyproject.toml
        id: ver
        run: echo "version=$(grep -m1 '^version = ' pyproject.toml | sed 's/.*\"\(.*\)\".*/\1/')" >> "$GITHUB_OUTPUT"

      - name: Release only when the tag does not exist yet
        id: gate
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.ver.outputs.version }}" | grep -q .; then
            echo "v${{ steps.ver.outputs.version }} already tagged - skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # PAT (not GITHUB_TOKEN) so the new tag cascades into docker-publish.yml.
      - name: Create tag + release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          gh release create "v${{ needs.check.outputs.version }}" \
            --title "v${{ needs.check.outputs.version }}" \
            --notes "Automated build." \
            --target "$GITHUB_SHA"

  windows:
    needs: [check, release]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      - name: Build
        run: pwsh .\build_win.ps1

      - name: Zip
        run: Compress-Archive -Path dist\AESPA -DestinationPath "AESPA-windows-v${{ needs.check.outputs.version }}.zip"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: gh release upload "v${{ needs.check.outputs.version }}" "AESPA-windows-v${{ needs.check.outputs.version }}.zip"

  macos:
    needs: [check, release]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: brew install create-dmg

      - name: Import signing certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KC_PW: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KC_PW" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KC_PW" build.keychain
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PW" build.keychain

      - name: Cache notary credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials aespa-notary \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD"

      - name: Build, sign, notarize, and staple app + dmg
        run: |
          ./build_mac.sh
          ./make_dmg.sh

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: gh release upload "v${{ needs.check.outputs.version }}" "dist/AESPA-macos-v${{ needs.check.outputs.version }}.dmg"
