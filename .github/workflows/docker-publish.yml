name: Publish to Docker Hub

on:
  push:
    tags: ["v*"]        # push a tag like v0.6.20260625.3 to release
  workflow_dispatch: {}  # or run manually from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from pyproject.toml
        id: ver
        run: echo "version=$(grep -m1 '^version = ' pyproject.toml | sed 's/.*\"\(.*\)\".*/\1/')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/aespa:${{ steps.ver.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/aespa:latest
